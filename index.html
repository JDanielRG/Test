<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Datos - Google Sheets</title>
    <style>
        /* Tus estilos se mantienen intactos aquí */
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            padding: 40px; 
            background-color: #f8f9fa; 
            color: #333;
        }
        .container { 
            max-width: 1000px; 
            margin: auto; 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }
        h2 { color: #1a73e8; margin-bottom: 25px; border-bottom: 2px solid #e8eaed; pb: 10px; }
        
        table { border-collapse: collapse; width: 100%; margin-top: 10px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #edf2f7; }
        th { background-color: #1a73e8; color: white; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        tr:hover { background-color: #f1f3f4; transition: 0.2s; }
        
        /* Estilo para cuando está cargando */
        #loader { text-align: center; padding: 20px; font-style: italic; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h2>Reporte en Tiempo Real</h2>
    <div id="tabla-contenedor">
        <p id="loader">Conectando con Google Sheets...</p>
    </div>
</div>

<script>
    // Reemplaza esto con tu URL de "Publicar en la Web" (formato CSV)
    const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSeSsEyntLGNGJU-uq7V4aFrP0QIYFTaBZ-hXeeAXsmlW6hEFhaA5aDC_dyX23anFasD_iLN1nj_FWN/pub?gid=991812807&single=true&output=csv';

    async function cargarDatos() {
        try {
            const respuesta = await fetch(url);
            const contenido = await respuesta.text();
            
            // Dividimos por filas y luego por comas
            const filas = contenido.split('\n');
            let tablaHtml = '<table>';

            filas.forEach((fila, indice) => {
                if (fila.trim() === "") return; // Ignorar líneas vacías
                
                tablaHtml += '<tr>';
                const columnas = fila.split(',');
                
                columnas.forEach(col => {
                    if (indice === 0) {
                        tablaHtml += `<th>${col}</th>`;
                    } else {
                        tablaHtml += `<td>${col}</td>`;
                    }
                });
                tablaHtml += '</tr>';
            });

            tablaHtml += '</table>';
            document.getElementById('tabla-contenedor').innerHTML = tablaHtml;

        } catch (error) {
            document.getElementById('tabla-contenedor').innerHTML = 
                `<p style="color:red">Error al cargar los datos: ${error.message}</p>`;
        }
    }

    cargarDatos();
</script>

</body>
</html>
