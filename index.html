<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RayenBody | Luxury Shop</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <div class="logo-container"><img src="logo.png" alt="RayenBody Logo"></div>
    <div class="search-container">
        <input type="text" id="search-input" placeholder="¿Qué estás buscando hoy?" onkeyup="ejecutarFiltros()">
    </div>
</header>

<div class="layout">
    <aside>
        <h2>Categorías</h2>
        <nav id="lista-categorias">
            <button class="filter-btn active" data-cat="todos" onclick="seleccionarCategoria('todos', this)">Ver Todo</button>
        </nav>
    </aside>

    <main style="flex: 1;">
        <div id="seccion-promociones"></div>
        <h1 id="titulo-filtro" style="color:var(--deep-magenta); font-size: 1.8rem; margin-bottom: 25px;">Nuestro Catálogo</h1>
        <div id="product-container" class="product-grid"></div>
    </main>
</div>

<div id="cart-floating-btn" class="cart-btn-hidden" onclick="toggleCart()">
    <span>🛒 <span id="cart-count">0</span> Productos</span>
    <span id="cart-total-btn">$0.00</span>
</div>

<div id="cart-drawer" class="drawer-closed">
    <div class="drawer-header">
        <h3>Tu Carrito</h3>
        <button onclick="toggleCart()" class="close-btn">&times;</button>
    </div>
    
    <div id="cart-items-container">
        </div>

    <div class="drawer-footer">
        <div class="shipping-info">
            <h4>Información de Envío</h4>
            <input type="text" id="ship-name" placeholder="Nombre completo">
            <input type="text" id="ship-address" placeholder="Dirección de envío (Calle, Ciudad)">
        </div>
        
        <div class="total-section">
            <span>Total Estimado:</span>
            <span id="cart-total-price">$0.00</span>
        </div>
        
        <button class="btn-order" onclick="enviarWhatsApp()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="20" style="margin-right:10px">
            Enviar Pedido por WhatsApp
        </button>
    </div>
</div>

<div id="overlay" onclick="toggleCart()"></div>

<script src="script.js"></script>
</body>
</html>
